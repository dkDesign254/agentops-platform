<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- NexusOps favicon — hexagonal nexus mark on dark background -->
  <rect width="32" height="32" rx="7" fill="#07080b"/>
  <!-- Outer hexagon -->
  <path d="M16,3.5 L26.4,9.25 L26.4,20.75 L16,26.5 L5.6,20.75 L5.6,9.25 Z"
    fill="rgba(14,164,114,0.15)" stroke="#0ea472" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Three diagonal axes -->
  <line x1="26.4" y1="9.25"  x2="5.6"  y2="20.75" stroke="#0ea472" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
  <line x1="26.4" y1="20.75" x2="5.6"  y2="9.25"  stroke="#0ea472" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
  <line x1="16"   y1="3.5"   x2="16"   y2="26.5"  stroke="#0ea472" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
  <!-- Centre node -->
  <circle cx="16" cy="15" r="2.4" fill="#0ea472"/>
  <!-- Corner nodes -->
  <circle cx="16"   cy="3.5"  r="1.5" fill="#0ea472" opacity="0.65"/>
  <circle cx="26.4" cy="9.25" r="1.5" fill="#0ea472" opacity="0.65"/>
  <circle cx="26.4" cy="20.75" r="1.5" fill="#0ea472" opacity="0.65"/>
  <circle cx="16"   cy="26.5" r="1.5" fill="#0ea472" opacity="0.65"/>
  <circle cx="5.6"  cy="20.75" r="1.5" fill="#0ea472" opacity="0.65"/>
  <circle cx="5.6"  cy="9.25"  r="1.5" fill="#0ea472" opacity="0.65"/>
</svg>
